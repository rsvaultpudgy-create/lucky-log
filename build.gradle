plugins { id 'java' }
repositories {
    mavenLocal()
    maven { url = 'https://repo.runelite.net'; content { includeGroupByRegex("net\\.runelite.*") } }
    mavenCentral()
}
def runeLiteVersion = 'latest.release'
dependencies {
    compileOnly group: 'net.runelite', name: 'client', version: runeLiteVersion
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    testImplementation 'junit:junit:4.13.2'
    testImplementation group: 'net.runelite', name: 'client', version: runeLiteVersion
    testImplementation group: 'net.runelite', name: 'jshell', version: runeLiteVersion
    testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'
}
group = 'com.pudgy.droptracker'
version = '1.0'
tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8'; options.release.set(11) }
tasks.register('run', JavaExec) {
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.pudgy.droptracker.DropTrackerTest'
    jvmArgs "-ea", "-Xmx768M"
    args "--developer-mode", "--debug"
}
